<div class="formulaire_recherche_avancee">
<h1>Recherche avancée</h1>

<form method="POST" action="{{ url_for('home') }}">
  <input type="hidden" name="q" value="{{ q or '' }}">
  <label>Auteur</label>
  <input type="text" name="auteur" />

  <label>Institution</label>
  <select name="institution">
    <option value="">-- Toutes --</option>
    {% for inst in options.institutions %}
    <option value="{{ inst }}">{{ inst }}</option>
    {% endfor %}
  </select>

  <label>Typologie</label>
  <select name="typologie">
    <option value="">-- Toutes --</option>
    {% for typo in options.typologies %}
    <option value="{{ typo }}">{{ typo }}</option>
    {% endfor %}
  </select>

  <label>Langue</label>
  <select name="langue">
    <option value="">-- Toutes --</option>
    {% for lng in options.langues %}
    <option value="{{ lng }}">{{ lng }}</option>
    {% endfor %}
  </select>

  <label>Sujet</label>
  <select name="sujet_rameau">
    <option value="">-- Tous --</option>
    {% for sujet in options.sujets_rameau %}
    <option value="{{ sujet }}">{{ sujet }}</option>
    {% endfor %}
  </select>

  <label>Date min</label>
  <input type="number" name="date_min" placeholder="ex. 2005" />

  <label>Date max</label>
  <input type="number" name="date_max" placeholder="ex. 2015" />

  <button type="submit">Rechercher</button>
</form>

</div>
