{% extends "base.html"%}

<!--CSS propre à la carte-->
{% block body_class %}page-carto{% endblock %}

{% block content %}
    <!-- Emplacement de la carte -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    //Injecte des données FLASK grâce à Jinja
    const COUNTRY_MAP = {{ COUNTRY_MAP | tojson }};

    // Crée un set avec les données Flask injectée grâce à Jinja
    const countriesInDB = new Set({{ PAYS_AVEC_PUBLICATIONS | tojson }});

    // Inverse Country_map pour que le noms des pays s'affichant soit en français. Sinon c'est le nom qu'a utilisé le GeoJson qui s'affiche
    const EN_TO_FR = {};
    for (const [fr, en] of Object.entries(COUNTRY_MAP)) {
        if (!(en in EN_TO_FR)) EN_TO_FR[en] = fr;
    }

    //Initialisation de Leaflet
    const map = L.map('map', {
        center: [45, 15],
        zoom: 3.5,
        minZoom: 2,
        maxZoom: 8,
    });

    // Force Leaflet à recalculer la taille réelle du conteneur
    setTimeout(() => map.invalidateSize(), 100);

    // Fond de carte avec sources
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
        subdomains: 'abcd',
        maxZoom: 19,
    }).addTo(map);

    /* ──────────────────────────────────────────────────────────
    Cache des comptes de publications
    ────────────────────────────────────────────────────────── */
    //Stocke en cache le compte des publications, pour éviter les requêtes répétées. 
    const pubCountCache = {};

    //Récuppère le nombre de publicayions pour un pays donné. 
    async function fetchPubCount(countryEn) {
        //pubCountCache place les informations en cache. Si la donnée n'est pas déjà dans le cache, elle la réccupère
        if (pubCountCache[countryEn] !== undefined) return pubCountCache[countryEn];
        try {
            //Appelle la route qui compte les publications. "encodeURIComponent" encode le nom pour éviter les problèmes d'accents ou autres. 
            const res = await fetch(`/c_publication_count?country=${encodeURIComponent(countryEn)}`);
            //Attend la réponse HTTP et la stocke en Json quand reçue.
            const data = await res.json();
            //Stocke le nombre en cache. Si la réponse est NULL, il met 0. 
            pubCountCache[countryEn] = data.count || 0;
        } catch {
            //Si la requête échoue (erreur serveur ou réseau), la réponse par défaut est zéro, ainsi on a pas de message d'erreur.
            pubCountCache[countryEn] = 0;
        }
        return pubCountCache[countryEn];
    }

    /* ──────────────────────────────────────────────────────────
    GeoJSON : chargement et rendu
    ────────────────────────────────────────────────────────── */
    let geojsonLayer;
    let activeLayer = null;

    // Styles
    function styleDefault(feature) { //feature est un objet qui représente un pays dans le GeoJson réccupéré sur Github. 
        //Dans nameEn est stocké le nom du pays dans le GeoJson (dans ce dernier il s'appelle "ADMIN" ou name)
        const nameEn = feature.properties.ADMIN || feature.properties.name || '';
        //inDB stocke les noms de la base de données TRHAA qui existent dans le GeoJson
        const inDB = countriesInDB.has(nameEn);
        return {
            //Si le pays est dans inDB, premier option, sinon deuxième option
            fillColor:   inDB ? '#1e3454' : '#2c3340', //Couleur du pays
            fillOpacity: inDB ? 0.65 : 0.35,
            color:       inDB ? '#2e4f7a' : 'rgba(255,255,255,0.08)', //Contour du pays
            weight:      inDB ? 0.8 : 0.5,
        };
    }

    //Style au survol de la souris. 
    function styleHover(feature) {
        return {
            fillColor:   '#d9cfb8',
            fillOpacity: 0.75,
            color:       '#e8e0cc',
            weight:      1.2,
        };
    }

    // Infobulle
    const tooltip = L.tooltip({
        permanent: false, //Pas toujours visible
        direction: 'auto', //Définit où apparait l'infobulle. Avec auto, elle s'affichera où elle pourra, selon la place qu'il y a. 
        className: 'thraa-infobulle',
        sticky: false, //Colle à la souris
    });

    //Construit l'infobulle en fonction des données. 
    /**
     * Construit le HTML d'un tooltip pour afficher les informations d'un pays.
     * Cette fonction génère une chaîne HTML structurée pour afficher :
     * - Le nom du pays (en français si disponible, sinon en anglais).
     * - Le nombre de publications associées (si le pays est référencé dans la base).
     * - Un badge indiquant si le pays est référencé dans THRAA ou non.
     *
     * @param {string} nameFr - Le nom du pays en français.
     * @param {string} nameEn - Le nom du pays en anglais.
     * @param {number} count - Le nombre de publications associées au pays (si référencé).
     * @param {boolean} inDB - Indique si le pays est référencé dans la base de données (`true`) ou non (`false`).
     *
     * @returns {string} Une chaîne HTML représentant le tooltip.
     */
    function buildTooltipHTML(nameFr, nameEn, count, inDB) {
        const badge = inDB
            ? `<span class="tt-badge in-base">Référencé dans THRAA</span>`
            : `<span class="tt-badge not-in-base">Non référencé</span>`;

        const pubLine = inDB
            ? `<div class="tt-row">Publications associées : <span class="tt-count">${count}</span></div>`
            : '';

        return `
            <div class="tt-country">${nameFr || nameEn}</div>
            ${pubLine}
            ${badge}
        `;
    }

    // Événements par pays
    /**
     * Callback Leaflet pour chaque feature (pays) du GeoJSON.
     * Attache des gestionnaires d'événements pour afficher/mettre à jour une infobulle,
     * styliser la feature au survol, et gérer les clics.
     *
     * @param {Object} feature - La feature GeoJSON représentant un pays.
     * @param {Object} layer - L'objet `L.Layer` Leaflet associé à la feature.
     *
     * @description
     * - **Survol** (`mouseover`) : Affiche une infobulle avec le nom du pays et, si référencé dans la base,
     *   le nombre de publications. Met à jour le style de la feature.
     * - **Déplacement de la souris** (`mousemove`) : Déplace l'infobulle avec la souris.
     * - **Sortie de la souris** (`mouseout`) : Ferme l'infobulle et réinitialise le style.
     * - **Clique** (`click`) : Redirige vers la page de recherche avancée si le pays est référencé.
     *
     */
    function onEachFeature(feature, layer) {
        const nameEn = feature.properties.ADMIN || feature.properties.name || '';
        const nameFr = EN_TO_FR[nameEn] || nameEn;   // nom français via COUNTRY_MAP inversé
        const inDB   = countriesInDB.has(nameEn);

        layer.on({
            mouseover: async function(e) { //Affiche l'infobulle
                if (activeLayer && activeLayer !== layer) {
                    geojsonLayer.resetStyle(activeLayer);
                }
                layer.setStyle(styleHover(feature));
                layer.bringToFront();

                // Initialise le tooltip avec le nom pendant le chargement du compte
                tooltip.setContent(buildTooltipHTML(nameFr, nameEn, '…', inDB));
                layer.bindTooltip(tooltip).openTooltip(e.latlng);

                if (inDB) {
                    const count = await fetchPubCount(nameEn);
                    tooltip.setContent(buildTooltipHTML(nameFr, nameEn, count, inDB));
                }
            },

            mousemove: function(e) { //Met à jour la position de l'infobulle
                tooltip.setLatLng(e.latlng);
            },
            
            mouseout: function() { //Ferme l'infobulle
                if (activeLayer !== layer) {
                    geojsonLayer.resetStyle(layer);
                }
                layer.closeTooltip();
            },

            click: function() {
                if (!inDB) return; // Pas de clic si pays hors base
                // Navigue vers la page résultats avec le nom anglais
                window.location.href = `/e_recherche_avancee?pays=${encodeURIComponent(nameFr)}`;
            },
        });
    }

    // Fetch du GeoJSON
    fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
        .then(r => r.json())
        .then(data => {
            geojsonLayer = L.geoJSON(data, {
                style: styleDefault,
                onEachFeature: onEachFeature,
            }).addTo(map);

            // Masquer l'overlay de chargement
            const overlay = document.getElementById('loading');
            if (overlay) overlay.classList.add('hidden');
        })
        .catch(err => {
            console.error('Erreur chargement GeoJSON :', err);
            const sub = document.querySelector('#loading .loader-sub');
            if (sub) sub.textContent = 'Erreur de chargement — vérifiez la connexion.';
        });
    </script>
{% endblock %}
