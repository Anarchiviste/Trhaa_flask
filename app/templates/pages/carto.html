<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRAA — Cartographie des publications</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Google Fonts : Cormorant Garamond (display) + Source Sans 3 (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ─── Variables ─────────────────────────────────────────────── */
        :root {
            --bg:           #0f1117;
            --surface:      #171c27;
            --surface-2:    #1e2535;
            --border:       rgba(255,255,255,0.07);
            --text:         #d6cfc3;
            --text-dim:     #7a8394;
            --accent:       #4e8fb5;       /* bleu atlas */
            --accent-light: #7fb8d8;
            --gold:         #c9a84c;
            --country-in:   #4e8fb5;       /* pays en base */
            --country-out:  #2c3340;       /* pays hors base */
            --country-hover:#c9a84c;
            --shadow:       0 8px 32px rgba(0,0,0,0.5);
        }

        /* ─── Reset & base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 300;
            overflow: hidden;
        }

        /* ─── Layout ────────────────────────────────────────────────── */
        .shell {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
        }

        /* ─── Header ────────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1000;
            animation: slideDown 0.5s ease both;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        .header-brand {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }

        .header-brand h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: #fff;
        }

        .header-brand span {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .header-sep {
            width: 1px;
            height: 20px;
            background: var(--border);
        }

        /* ─── Legend ────────────────────────────────────────────────── */
        .legend {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .dot-in  { background: var(--country-in);  opacity: 0.85; }
        .dot-out { background: var(--country-out); border: 1px solid rgba(255,255,255,0.15); }
        .dot-hover { background: var(--country-hover); }

        /* ─── Map container ─────────────────────────────────────────── */
        #map {
            width: 100%;
            height: 100%;
            background: var(--bg);
            animation: fadeIn 0.8s 0.3s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ─── Leaflet overrides ─────────────────────────────────────── */
        .leaflet-container {
            background: #0a0d14 !important;
        }

        .leaflet-control-zoom {
            border: none !important;
            border-radius: 4px !important;
            overflow: hidden;
            box-shadow: var(--shadow) !important;
        }

        .leaflet-control-zoom a {
            background: var(--surface-2) !important;
            color: var(--text) !important;
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            font-size: 1.1rem !important;
            transition: background 0.15s, color 0.15s;
        }

        .leaflet-control-zoom a:hover {
            background: var(--accent) !important;
            color: #fff !important;
        }

        .leaflet-control-attribution {
            background: rgba(15,17,23,0.75) !important;
            color: var(--text-dim) !important;
            font-size: 0.65rem !important;
            backdrop-filter: blur(4px);
        }

        .leaflet-control-attribution a { color: var(--accent-light) !important; }

        /* ─── Custom tooltip ────────────────────────────────────────── */
        .thraa-tooltip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.55rem 0.85rem;
            box-shadow: var(--shadow);
            pointer-events: none;
            min-width: 160px;
        }

        .thraa-tooltip .tt-country {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }

        .thraa-tooltip .tt-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .thraa-tooltip .tt-count {
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 600;
        }

        .thraa-tooltip .tt-badge {
            display: inline-block;
            padding: 0.1rem 0.45rem;
            border-radius: 3px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 0.35rem;
        }

        .tt-badge.in-base {
            background: rgba(78,143,181,0.18);
            color: var(--accent-light);
            border: 1px solid rgba(78,143,181,0.3);
        }

        .tt-badge.not-in-base {
            background: rgba(255,255,255,0.04);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* ─── Loading overlay ───────────────────────────────────────── */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 1.5rem;
            transition: opacity 0.4s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 0.15em;
        }

        .loader-bar {
            width: 180px;
            height: 2px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            animation: loadBar 1.6s ease-in-out infinite;
        }

        @keyframes loadBar {
            0%   { width: 0%;   margin-left: 0; }
            50%  { width: 60%;  margin-left: 20%; }
            100% { width: 0%;   margin-left: 100%; }
        }

        .loader-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ─── Stat badge (top-right) ────────────────────────────────── */
        #stat-badge {
            position: absolute;
            top: 56px;
            right: 0;
            margin: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 1rem;
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            z-index: 500;
            display: none;
            box-shadow: var(--shadow);
            animation: fadeIn 0.3s ease both;
        }

        #stat-badge strong {
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.15rem;
        }
    </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
    <div class="loader-title">THRAA</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-sub">Chargement de la carte…</div>
</div>

<!-- Page shell -->
<div class="shell">

    <!-- Header -->
    <header>
        <div class="header-brand">
            <h1>THRAA</h1>
            <div class="header-sep"></div>
            <span>Cartographie des publications</span>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot dot-in"></div>
                <span>Pays référencé</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot dot-hover"></div>
                <span>Survolé</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot dot-out"></div>
                <span>Non référencé</span>
            </div>
        </div>
    </header>

    <!-- Map -->
    <div id="map"></div>

</div>

<!-- Stat badge -->
<div id="stat-badge" id="stat-badge"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ──────────────────────────────────────────────────────────
   Données injectées par Flask (Jinja2)
   COUNTRY_MAP              : { "Allemagne": "Germany", … }  — tous les pays traduits
   PAYS_AVEC_PUBLICATIONS   : ["France", "Germany", …]       — pays ayant ≥ 1 publication (noms anglais)
────────────────────────────────────────────────────────── */
const COUNTRY_MAP = {{ COUNTRY_MAP | tojson }};

// Seuls les pays ayant réellement des publications → coloration bleue
const countriesInDB = new Set({{ PAYS_AVEC_PUBLICATIONS | tojson }});

// Dictionnaire inversé : nom anglais → nom français
// ex: "Germany" → "Allemagne", "France" → "France"
const EN_TO_FR = {};
for (const [fr, en] of Object.entries(COUNTRY_MAP)) {
    if (!(en in EN_TO_FR)) EN_TO_FR[en] = fr;
}

/* ──────────────────────────────────────────────────────────
   Initialisation Leaflet
────────────────────────────────────────────────────────── */
const map = L.map('map', {
    center: [20, 10],
    zoom: 2,
    minZoom: 2,
    maxZoom: 8,
    zoomControl: true,
    attributionControl: true,
    worldCopyJump: false,
});

// Fond de carte CartoDB Dark Matter (sobre, académique)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    subdomains: 'abcd',
    maxZoom: 19,
}).addTo(map);

/* ──────────────────────────────────────────────────────────
   Cache des comptes de publications
────────────────────────────────────────────────────────── */
const pubCountCache = {};

async function fetchPubCount(countryEn) {
    if (pubCountCache[countryEn] !== undefined) return pubCountCache[countryEn];
    try {
        const res = await fetch(`/c_publication_count?country=${encodeURIComponent(countryEn)}`);
        const data = await res.json();
        pubCountCache[countryEn] = data.count || 0;
    } catch {
        pubCountCache[countryEn] = 0;
    }
    return pubCountCache[countryEn];
}

/* ──────────────────────────────────────────────────────────
   GeoJSON : chargement et rendu
────────────────────────────────────────────────────────── */
let geojsonLayer;
let activeLayer = null;

// Styles
function styleDefault(feature) {
    const nameEn = feature.properties.ADMIN || feature.properties.name || '';
    const inDB = countriesInDB.has(nameEn);
    return {
        fillColor:   inDB ? '#4e8fb5' : '#2c3340',
        fillOpacity: inDB ? 0.65 : 0.35,
        color:       inDB ? '#7fb8d8' : 'rgba(255,255,255,0.08)',
        weight:      inDB ? 0.8 : 0.5,
    };
}

function styleHover(feature) {
    return {
        fillColor:   '#c9a84c',
        fillOpacity: 0.75,
        color:       '#e8c97a',
        weight:      1.2,
    };
}

// Tooltip personnalisé (div HTML Leaflet)
const tooltip = L.tooltip({
    permanent: false,
    direction: 'auto',
    className: 'thraa-tooltip',
    opacity: 1,
    sticky: true,
});

function buildTooltipHTML(nameFr, nameEn, count, inDB) {
    const badge = inDB
        ? `<span class="tt-badge in-base">Référencé dans THRAA</span>`
        : `<span class="tt-badge not-in-base">Non référencé</span>`;

    const pubLine = inDB
        ? `<div class="tt-row">Publications associées : <span class="tt-count">${count}</span></div>`
        : '';

    return `
        <div class="tt-country">${nameFr || nameEn}</div>
        ${pubLine}
        ${badge}
    `;
}

// Événements par feature
function onEachFeature(feature, layer) {
    const nameEn = feature.properties.ADMIN || feature.properties.name || '';
    const nameFr = EN_TO_FR[nameEn] || nameEn;   // nom français via COUNTRY_MAP inversé
    const inDB   = countriesInDB.has(nameEn);

    layer.on({
        mouseover: async function(e) {
            if (activeLayer && activeLayer !== layer) {
                geojsonLayer.resetStyle(activeLayer);
            }
            layer.setStyle(styleHover(feature));
            layer.bringToFront();

            // Initialise le tooltip avec le nom pendant le chargement du compte
            tooltip.setContent(buildTooltipHTML(nameFr, nameEn, '…', inDB));
            layer.bindTooltip(tooltip).openTooltip(e.latlng);

            if (inDB) {
                const count = await fetchPubCount(nameEn);
                tooltip.setContent(buildTooltipHTML(nameFr, nameEn, count, inDB));
            }
        },

        mousemove: function(e) {
            tooltip.setLatLng(e.latlng);
        },

        mouseout: function() {
            if (activeLayer !== layer) {
                geojsonLayer.resetStyle(layer);
            }
            layer.closeTooltip();
        },

        click: function() {
            if (!inDB) return; // Pas de clic si pays hors base
            // Navigue vers la page résultats avec le nom anglais
            window.location.href = `/resultat_pays/${encodeURIComponent(nameEn)}`;
        },
    });

    // Curseur pointer uniquement pour les pays en base
    if (inDB) {
        layer.getElement && layer.on('add', () => {
            if (layer.getElement()) layer.getElement().style.cursor = 'pointer';
        });
    }
}

// Fetch du GeoJSON et rendu
fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
    .then(r => r.json())
    .then(data => {
        geojsonLayer = L.geoJSON(data, {
            style: styleDefault,
            onEachFeature: onEachFeature,
        }).addTo(map);

        // Masquer l'overlay de chargement
        document.getElementById('loading').classList.add('hidden');
    })
    .catch(err => {
        console.error('Erreur chargement GeoJSON :', err);
        document.getElementById('loading').querySelector('.loader-sub').textContent =
            'Erreur de chargement — vérifiez la connexion.';
    });

/* ──────────────────────────────────────────────────────────
   Curseur pointer sur les pays en base (fix post-render)
────────────────────────────────────────────────────────── */
map.on('layeradd', function() {
    document.querySelectorAll('.leaflet-interactive').forEach(el => {
        // Le style cursor est géré individuellement via mouseenter/leave
    });
});
</script>
</body>
</html>
